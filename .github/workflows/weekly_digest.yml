name: Weekly Launch Digest

on:
  schedule:
    - cron: '0 14 * * 5'  # Fridays at 2pm UTC (10am ET / 7am PT)
  workflow_dispatch:        # Also triggerable manually from the Actions tab

permissions:
  contents: write           # Needed to commit and push docs/index.html

jobs:
  send-digest:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run digest
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
          SITE_URL: ${{ secrets.SITE_URL }}
        run: python3 -m digest.main

      - name: Commit and push digest page
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.html
          git diff --staged --quiet || git commit -m "Weekly Launch Digest — $(date +'%B %d, %Y')"
          git push
